<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debashis Roy | Infrastructure Upgrade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #02040a; 
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

     
        #particle-wrapper {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            z-index: 1;
            transform-style: preserve-3d;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .shape-3d {
            position: absolute;
            transform-style: preserve-3d;
            animation: drift linear infinite alternate;
            pointer-events: none;
        }

        
        .circle { border-radius: 50%; }
        .square { border-radius: 8px; }
        .triangle {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background-color: currentColor;
        }

        
        @keyframes drift {
            0% {
                transform: translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
            100% {
                transform: translate3d(100px, -150px, 300px) rotateX(180deg) rotateY(180deg) rotateZ(180deg);
            }
        }

        
        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 0%, rgba(2, 4, 10, 0.8) 100%);
            pointer-events: none; 
        }

       
        .glass-card {
            pointer-events: auto; 
            background: rgba(255, 255, 255, 0.02); 
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 4rem;
            max-width: 720px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

       
        .domain-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2.5rem;
            display: inline-block;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 50px;
            color: #60a5fa;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #3b82f6;
            border-radius: 50%;
            box-shadow: 0 0 12px #3b82f6;
            animation: blink 1.5s infinite ease-in-out;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
            margin: 0 0 1.5rem 0;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.8;
            margin: 0 0 3rem 0;
            font-weight: 300;
        }

       
        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .progress-indicator {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 20%;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
            box-shadow: 0 0 20px #3b82f6;
            animation: scan 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes scan {
            0% { left: -25%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div id="particle-wrapper"></div>

    <div class="ui-layer">
        <div class="glass-card" id="glass-card">
            <div class="domain-name">DEBASHIS.PRO.BD</div>
            <br>
            <div class="badge">
                <div class="status-dot"></div>
                Status: Deployment Phase
            </div>
            
            <h1>Something beautiful is taking shape.</h1>
            
            <p>We are currently architecting a sophisticated digital environment. Our core infrastructure is undergoing a comprehensive upgrade to deliver an unparalleled, highly optimized user experience. Please check back shortly.</p>
            
            <div class="progress-track">
                <div class="progress-indicator"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const wrapper = document.getElementById('particle-wrapper');
            const glassCard = document.getElementById('glass-card');
            const shapeTypes = ['circle', 'square', 'triangle'];
            
            
            const colors = ['#06b6d4', '#8b5cf6', '#3b82f6', '#14b8a6', '#d946ef'];

           
            for (let i = 0; i < 160; i++) {
                createShape(false);
            }

            
            for (let i = 0; i < 280; i++) {
                createShape(true);
            }

            function createShape(isDust) {
                const el = document.createElement('div');
                const type = isDust ? 'circle' : shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                const size = isDust ? Math.random() * 4 + 2 : Math.random() * 70 + 15;
                
                
                const topPos = Math.random() * 100;
                const leftPos = Math.random() * 100;
                
                const duration = Math.random() * 15 + 15; 
                const delay = Math.random() * -30; 
                
                el.className = `shape-3d ${type}`;
                el.style.width = `${size}px`;
                el.style.height = `${size}px`;
                el.style.top = `${topPos}%`;
                el.style.left = `${leftPos}%`;
                el.style.animationDuration = `${duration}s`;
                el.style.animationDelay = `${delay}s`;
                
                
                if (Math.random() > 0.5) {
                    el.style.animationDirection = 'alternate-reverse';
                }

                if (isDust) {
                    el.style.backgroundColor = '#ffffff';
                    el.style.opacity = Math.random() * 0.4 + 0.1;
                    el.style.boxShadow = `0 0 8px rgba(255,255,255,0.6)`;
                } else {
                    el.style.color = color; 
                    el.style.opacity = Math.random() * 0.35 + 0.05;
                    
                    if (type === 'circle') {
                        el.style.background = `radial-gradient(circle at 30% 30%, ${color}, transparent)`;
                        el.style.boxShadow = `0 0 25px ${color}`;
                    } else if (type === 'square') {
                        el.style.border = `2px solid ${color}`;
                        el.style.backgroundColor = 'transparent';
                        el.style.boxShadow = `inset 0 0 15px ${color}, 0 0 15px ${color}`;
                    }
                }

                wrapper.appendChild(el);
            }

           
            document.addEventListener('mousemove', (e) => {
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;

                
                const xPos = (mouseX / windowWidth - 0.5) * 2;
                const yPos = (mouseY / windowHeight - 0.5) * 2;

                wrapper.style.transform = `rotateX(${yPos * -15}deg) rotateY(${xPos * 15}deg) translateZ(-50px)`;

              
                const cardRect = glassCard.getBoundingClientRect();
                const cardX = mouseX - cardRect.left;
                const cardY = mouseY - cardRect.top;
                
                
                glassCard.style.background = `
                    radial-gradient(circle 300px at ${cardX}px ${cardY}px, rgba(255, 255, 255, 0.06), transparent),
                    rgba(255, 255, 255, 0.02)
                `;
            });
        });
    </script>
</body>
</html>
